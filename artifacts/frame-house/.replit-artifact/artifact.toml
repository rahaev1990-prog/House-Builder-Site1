kind = "web"
previewPath = "/"
title = "КаркасПро — Строительство каркасных домов"
version = "1.0.0"
id = "artifacts/frame-house"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18189
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/frame-house run dev"

[services.env]
PORT = "18189"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/frame-house", "run", "build"]
publicDir = "artifacts/frame-house/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
